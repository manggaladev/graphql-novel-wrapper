# Root Mutation type

type Mutation {
  # Auth mutations
  register(input: RegisterInput!): AuthPayload!
  login(input: LoginInput!): AuthPayload!
  refreshToken(refreshToken: String!): AuthPayload!
  logout: Boolean!

  # Novel mutations (auth required)
  createNovel(input: CreateNovelInput!): Novel!
  updateNovel(id: ID!, input: UpdateNovelInput!): Novel!
  deleteNovel(id: ID!): Boolean!

  # Chapter mutations (auth required)
  createChapter(novelId: ID!, input: CreateChapterInput!): Chapter!
  updateChapter(id: ID!, input: UpdateChapterInput!): Chapter!
  deleteChapter(id: ID!): Boolean!

  # Genre mutations (admin only)
  createGenre(name: String!): Genre!
  updateGenre(id: ID!, name: String!): Genre!
  deleteGenre(id: ID!): Boolean!

  # Bookmark mutations (auth required)
  addBookmark(novelId: ID!): Bookmark!
  removeBookmark(novelId: ID!): Boolean!

  # Comment mutations (auth required)
  addComment(chapterId: ID!, content: String!, parentId: ID): Comment!
  updateComment(id: ID!, content: String!): Comment!
  deleteComment(id: ID!): Boolean!
  likeComment(commentId: ID!): Boolean!
  unlikeComment(commentId: ID!): Boolean!

  # Rating mutations (auth required)
  rateNovel(novelId: ID!, score: Int!): Rating!
  removeRating(novelId: ID!): Boolean!

  # Follow mutations (auth required)
  followUser(userId: ID!): Boolean!
  unfollowUser(userId: ID!): Boolean!

  # Reading list mutations (auth required)
  createReadingList(input: CreateReadingListInput!): ReadingList!
  updateReadingList(id: ID!, input: UpdateReadingListInput!): ReadingList!
  deleteReadingList(id: ID!): Boolean!
  addNovelToReadingList(listId: ID!, novelId: ID!): Boolean!
  removeNovelFromReadingList(listId: ID!, novelId: ID!): Boolean!

  # Notification mutations (auth required)
  markNotificationAsRead(id: ID!): Boolean!
  markAllNotificationsAsRead: Boolean!
  deleteNotification(id: ID!): Boolean!
  clearAllNotifications: Boolean!

  # Reading history mutations (auth required)
  clearReadingHistory: Boolean!
  deleteHistoryEntry(id: ID!): Boolean!

  # NEW: v3.0.0 - Reading Progress mutation
  updateReadingProgress(novelId: ID!, chapterId: ID!): ReadingProgress!

  # NEW: v3.0.0 - Content Report mutation
  reportContent(input: ReportInput!): Report!
}

# NEW: v3.0.0 - Report Input
input ReportInput {
  targetType: ReportTargetType!
  targetId: ID!
  reason: String!
  description: String
}

# NEW: v3.0.0 - Report Target Types
enum ReportTargetType {
  NOVEL
  CHAPTER
  COMMENT
  USER
}

# NEW: v3.0.0 - Report type
type Report {
  id: ID!
  targetType: ReportTargetType!
  targetId: ID!
  reason: String!
  description: String
  status: ReportStatus!
  createdAt: String!
}

# NEW: v3.0.0 - Report Status
enum ReportStatus {
  PENDING
  REVIEWED
  RESOLVED
  DISMISSED
}
