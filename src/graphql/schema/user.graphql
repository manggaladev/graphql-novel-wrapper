# User types

enum Role {
  ADMIN
  AUTHOR
  USER
}

type User {
  id: ID!
  username: String!
  email: String!
  role: Role!
  avatar: String
  bio: String
  isVerified: Boolean!
  novelCount: Int
  followerCount: Int
  followingCount: Int
  createdAt: String!
  updatedAt: String!
}

type UserConnection {
  edges: [UserEdge!]!
  pageInfo: PageInfo!
  totalCount: Int!
}

type UserEdge {
  node: User!
  cursor: String!
}

type AuthPayload {
  accessToken: String!
  refreshToken: String!
  user: User!
}

# Auth inputs

input RegisterInput {
  username: String!
  email: String!
  password: String!
}

input LoginInput {
  email: String!
  password: String!
}

extend type Query {
  me: User
  user(id: ID!): User
  userNovels(id: ID!, page: Int = 1, limit: Int = 20): NovelConnection!
}
