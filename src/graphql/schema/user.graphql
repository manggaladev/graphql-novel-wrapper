# User types

enum Role {
  ADMIN
  USER
}

type User {
  id: ID!
  username: String!
  email: String!
  role: Role!
  avatar: String
  isVerified: Boolean!
  createdAt: String!
  updatedAt: String!
}

type AuthPayload {
  accessToken: String!
  refreshToken: String!
  user: User!
}

# Auth inputs

input RegisterInput {
  username: String!
  email: String!
  password: String!
}

input LoginInput {
  email: String!
  password: String!
}
