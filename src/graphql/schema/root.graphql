# Root Query type

type Query {
  # Health check
  health: HealthStatus!

  # Novel queries
  novels(
    page: Int = 1
    limit: Int = 10
    sort: String
    order: SortOrder
    genre: String
    search: String
    status: NovelStatus
  ): NovelConnection!
  novel(id: ID!): Novel
  novelBySlug(slug: String!): Novel
  popularNovels(limit: Int = 10): [Novel!]!
  latestNovels(limit: Int = 10): [Novel!]!

  # NEW: v3.0.0 - Reading progress, recommendations, trending
  readingProgress(novelId: ID!): ReadingProgress
  recommendations(limit: Int = 10): [Novel!]!
  trendingNovels(limit: Int = 10): [Novel!]!
  similarNovels(novelId: ID!, limit: Int = 10): [Novel!]!

  # Chapter queries
  chapters(novelId: ID!, page: Int = 1, limit: Int = 10): ChapterConnection!
  chapter(id: ID!): Chapter
  chapterByNumber(novelId: ID!, chapterNum: Int!): Chapter

  # Genre queries
  genres: [Genre!]!
  genre(id: ID!): Genre

  # User queries
  me: User
  user(id: ID!): User
  userNovels(id: ID!, page: Int = 1, limit: Int = 20): NovelConnection!
  userBookmarks(page: Int = 1, limit: Int = 10): BookmarkConnection!
  userReadingHistory(page: Int = 1, limit: Int = 10): ReadingHistoryConnection!
  userComments: [Comment!]!

  # Comment queries
  comments(chapterId: ID!, page: Int = 1, limit: Int = 20): CommentConnection!
  commentReplies(commentId: ID!, page: Int = 1, limit: Int = 10): CommentConnection!

  # Follow queries
  followers(userId: ID!, page: Int = 1, limit: Int = 20): UserConnection!
  following(userId: ID!, page: Int = 1, limit: Int = 20): UserConnection!
  followStatus(userId: ID!): FollowStatus!

  # Reading list queries
  myReadingLists: [ReadingList!]!
  readingList(id: ID!, page: Int = 1, limit: Int = 20): ReadingList

  # Notification queries
  notifications(page: Int = 1, limit: Int = 20, unreadOnly: Boolean = false): NotificationConnection!
}

# Health check type

type HealthStatus {
  status: String!
  timestamp: String!
  restApiUrl: String!
}

# NEW: v3.0.0 - Reading Progress type
type ReadingProgress {
  novelId: ID!
  novel: Novel!
  currentChapterId: ID!
  currentChapter: Chapter!
  progress: Float!
  lastReadAt: String!
  chaptersRead: Int!
  totalChapters: Int!
}
